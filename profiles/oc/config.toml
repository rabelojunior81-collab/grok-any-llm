# Perfil OpenCode Go (subscription) — auto-contido.
# XAI_API_KEY (env, setada pelo gall) = key do OpenCode Go.
# Endpoint: https://opencode.ai/zen/go/v1 (subscription; chunk de custo pos-[DONE] ignoravel).
# Nao usa [endpoints] (o catalog /zen/go/v1/models pode nao servir); rely em entries oc-*.
[models]
default = "oc-glm-52"

[model.grok-build]
model = "glm-5.2"
base_url = "https://opencode.ai/zen/go/v1"
api_backend = "chat_completions"

[model.oc-glm-52]
model = "glm-5.2"
base_url = "https://opencode.ai/zen/go/v1"
name = "GLM 5.2 (OpenCode Go)"
api_backend = "chat_completions"
context_window = 128000

