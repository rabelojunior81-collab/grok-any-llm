name: 🐛 Bug report
description: Reporte um problema com o grok-any-llm/gall
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! **Não inclua keys/segredos** nos logs.
  - type: input
    id: version
    attributes:
      label: Versão do gall
      placeholder: "0.0.1"
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - OpenRouter (or)
        - Kilo Gateway (kilo)
        - OpenCode Go (oc)
        - default (~/.grok)
        - outro
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Modelo usado
      placeholder: "x-ai/grok-build-0.1"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: SO
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Passos para reproduzir
      placeholder: "1. `grok kilo` 2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Atual (erro)
      placeholder: "Cole o erro/log (SEM keys)."
    validations:
      required: true
