name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # ---- bash side (ubuntu / macos) ----
      - name: Install shellcheck + bats (unix)
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          sudo npm install -g bats

      - name: shellcheck
        if: runner.os != 'Windows'
        run: shellcheck src/*.sh src/install.sh

      - name: bats tests (unix)
        if: runner.os != 'Windows'
        run: bats tests/

      # ---- powershell side (all OSes; PS is cross-platform) ----
      - name: Install Pester + PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.5 -Force -Scope CurrentUser -SkipPublisherCheck
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck

      - name: PSScriptAnalyzer (lint PS)
        shell: pwsh
        run: Invoke-ScriptAnalyzer -Path src/*.ps1 -Severity Error,Warning -EnableExit

      - name: Pester tests (PS)
        shell: pwsh
        run: Invoke-Pester -Path tests/ -Output Detailed -CI

      # ---- landing HTML validate ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: html-validate (landing)
        run: |
          npm install -g html-validate
          html-validate landing/*.html
